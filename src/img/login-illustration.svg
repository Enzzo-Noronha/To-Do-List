<svg viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg" width="600" height="700">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#e94560" flood-opacity="0.3"/>
    </filter>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>

    <!-- Check gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>

    <!-- Circle gradient -->
    <radialGradient id="circleGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="personGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6a5"/>
      <stop offset="100%" style="stop-color:#ffb347"/>
    </linearGradient>

    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="700" fill="url(#bg)"/>

  <!-- Background decorative circles -->
  <circle cx="80" cy="120" r="180" fill="url(#circleGlow)" opacity="0.5"/>
  <circle cx="520" cy="580" r="150" fill="url(#circleGlow)" opacity="0.4"/>

  <!-- Floating dots pattern -->
  <circle cx="50" cy="200" r="3" fill="#e94560" opacity="0.4"/>
  <circle cx="90" cy="160" r="2" fill="#f5a623" opacity="0.3"/>
  <circle cx="550" cy="100" r="3" fill="#e94560" opacity="0.35"/>
  <circle cx="520" cy="150" r="2" fill="#f5a623" opacity="0.3"/>
  <circle cx="30" cy="500" r="2.5" fill="#e94560" opacity="0.3"/>
  <circle cx="570" cy="400" r="2" fill="#f5a623" opacity="0.4"/>

  <!-- Top accent line -->
  <rect x="220" y="0" width="160" height="3" fill="url(#accent)" rx="2"/>

  <!-- Main illustration card -->
  <rect x="50" y="80" width="500" height="540" rx="24" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- === ILLUSTRATION: Person working on checklist === -->

  <!-- Desk / table -->
  <rect x="100" y="430" width="400" height="12" rx="6" fill="rgba(255,255,255,0.12)"/>
  <rect x="160" y="440" width="12" height="80" rx="6" fill="rgba(255,255,255,0.08)"/>
  <rect x="428" y="440" width="12" height="80" rx="6" fill="rgba(255,255,255,0.08)"/>

  <!-- Laptop / screen -->
  <rect x="200" y="330" width="200" height="130" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Screen content -->
  <rect x="214" y="343" width="172" height="104" rx="6" fill="#0d1b2a"/>
  <!-- Screen lines (to-do list preview) -->
  <rect x="225" y="358" width="60" height="6" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="225" y="374" width="14" height="14" rx="3" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <rect x="225" y="374" width="14" height="14" rx="3" fill="url(#checkGrad)" opacity="0.8"/>
  <line x1="228" y1="381" x2="231" y2="384" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="231" y1="384" x2="237" y2="378" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="246" y="377" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.4)"/>

  <rect x="225" y="397" width="14" height="14" rx="3" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <rect x="246" y="400" width="65" height="5" rx="2.5" fill="rgba(255,255,255,0.3)"/>

  <rect x="225" y="417" width="14" height="14" rx="3" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <rect x="246" y="420" width="75" height="5" rx="2.5" fill="rgba(255,255,255,0.3)"/>

  <!-- Laptop base -->
  <rect x="185" y="458" width="230" height="10" rx="5" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Hinge line -->
  <line x1="220" y1="460" x2="380" y2="460" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Person sitting -->
  <!-- Body/shirt -->
  <ellipse cx="300" cy="370" rx="45" ry="55" fill="url(#shirtGrad)"/>
  <!-- Collar -->
  <path d="M 275 330 Q 300 345 325 330" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Head -->
  <circle cx="300" cy="280" r="48" fill="url(#personGrad)" filter="url(#shadow)"/>

  <!-- Hair -->
  <ellipse cx="300" cy="253" rx="48" ry="22" fill="#2c1810"/>
  <ellipse cx="253" cy="275" rx="12" ry="20" fill="#2c1810"/>
  <ellipse cx="347" cy="275" rx="12" ry="20" fill="#2c1810"/>

  <!-- Face features -->
  <!-- Eyes -->
  <ellipse cx="284" cy="280" rx="7" ry="8" fill="white"/>
  <ellipse cx="316" cy="280" rx="7" ry="8" fill="white"/>
  <circle cx="286" cy="281" r="4.5" fill="#1a1a2e"/>
  <circle cx="318" cy="281" r="4.5" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="288" cy="279" r="1.5" fill="white"/>
  <circle cx="320" cy="279" r="1.5" fill="white"/>

  <!-- Smile -->
  <path d="M 287 296 Q 300 308 313 296" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="272" cy="295" rx="8" ry="5" fill="#ffb6c1" opacity="0.5"/>
  <ellipse cx="328" cy="295" rx="8" ry="5" fill="#ffb6c1" opacity="0.5"/>

  <!-- Arms -->
  <!-- Left arm -->
  <path d="M 258 355 Q 230 380 220 410" stroke="#ffd6a5" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Right arm -->
  <path d="M 342 355 Q 370 380 380 410" stroke="#ffd6a5" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Hands -->
  <circle cx="218" cy="412" r="14" fill="#ffd6a5"/>
  <circle cx="382" cy="412" r="14" fill="#ffd6a5"/>

  <!-- Floating checklist items around -->
  <!-- Item 1 - checked -->
  <rect x="80" y="160" width="130" height="38" rx="10" fill="rgba(233,69,96,0.15)" stroke="rgba(233,69,96,0.4)" stroke-width="1"/>
  <circle cx="100" cy="179" r="8" fill="url(#checkGrad)" filter="url(#glow)"/>
  <line x1="96" y1="179" x2="99" y2="182" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="99" y1="182" x2="105" y2="175" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="116" y="175" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="116" y="183" width="55" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>

  <!-- Item 2 - pending -->
  <rect x="390" y="130" width="145" height="38" rx="10" fill="rgba(245,166,35,0.1)" stroke="rgba(245,166,35,0.35)" stroke-width="1"/>
  <circle cx="413" cy="149" r="8" fill="none" stroke="rgba(245,166,35,0.8)" stroke-width="2"/>
  <rect x="429" y="145" width="85" height="5" rx="2.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="429" y="153" width="60" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>

  <!-- Item 3 - checked -->
  <rect x="100" y="520" width="120" height="38" rx="10" fill="rgba(233,69,96,0.15)" stroke="rgba(233,69,96,0.4)" stroke-width="1"/>
  <circle cx="120" cy="539" r="8" fill="url(#checkGrad)"/>
  <line x1="116" y1="539" x2="119" y2="542" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="119" y1="542" x2="125" y2="535" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="136" y="535" width="68" height="5" rx="2.5" fill="rgba(255,255,255,0.4)"/>
  <rect x="136" y="543" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- Item 4 - pending -->
  <rect x="385" y="510" width="130" height="38" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="406" cy="529" r="8" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <rect x="422" y="525" width="78" height="5" rx="2.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="422" y="533" width="55" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>

  <!-- Bottom text branding -->
  <text x="300" y="652" font-family="'Georgia', serif" font-size="22" fill="white" text-anchor="middle" opacity="0.9" font-weight="bold" letter-spacing="3">MY TO-DO LIST</text>
  <text x="300" y="673" font-family="'Georgia', serif" font-size="11" fill="rgba(233,69,96,0.9)" text-anchor="middle" letter-spacing="6">ORGANIZE · FOCUS · ACHIEVE</text>

  <!-- Bottom accent line -->
  <rect x="220" y="685" width="160" height="2" fill="url(#accent)" rx="1"/>
</svg>

    <link rel="stylesheet" href="/src/styles/index.css" />
  </head>
  <body>
    <header>
      <h1>To Do List</h1>

    <main>
      <div class="menu">
        <button id="adicionarTarefa1">Adicionar Tarefa</button>
      </div>

      <div class="centralizada" id="adicionarTarefa2">

          <label class="title">Adicionar Tarefa</label>

          <button type="button" onclick="limpar()">Limpar</button>

        <button id="fecharTarefa">Fechar tarefa</button>
      </div>

      <div class="principal">
        <h1 class="title">Tarefas</h1>
        <ul id="listaTarefas"></ul>
      </div>
    </main>
    <script src="/src/script/main.js"></script>
